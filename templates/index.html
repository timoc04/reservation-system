<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fonteyn Reservation System</title>
</head>
<body>
    <h1>Fonteyn Reservation System</h1>

    {% if user %}
        <p>You are signed in as {{ user.name }}.</p>
        <a href="{{ url_for('main.dashboard') }}">Open dashboard</a>
        <br>
        <a href="{{ url_for('auth.logout') }}">Sign out</a>
    {% else %}
        <p>Please sign in to access the reservation system.</p>
        <a href="{{ url_for('auth.login') }}">Sign in with Microsoft Entra ID</a>
    {% endif %}
</body>
</html>
